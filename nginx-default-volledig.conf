# =============================================================================
# DEFAULT SERVER (ongewijzigd – laat dit blok staan)
# =============================================================================
server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # SSL configuration
        #
        # listen 443 ssl default_server;
        # listen [::]:443 ssl default_server;
        #
        # Note: You should disable gzip for SSL traffic.
        # See: https://bugs.debian.org/773332
        #
        # Read up on ssl_ciphers to ensure a secure configuration.
        # See: https://bugs.debian.org/765782
        #
        # Self signed certs generated by the ssl-cert package
        # Don't use them in a production server!
        #
        # include snippets/snakeoil.conf;

        root /var/www/html;

        # Add index.php to the list if you are using PHP
        index index.html index.htm index.nginx-debian.html;

        server_name _;
}

# =============================================================================
# TOEGEVOEGD: landgoedeigenaar.nl
# HTTP → doorverwijzen naar HTTPS
# =============================================================================
server {
        listen 80;
        listen [::]:80;
        server_name www.landgoedeigenaar.nl landgoedeigenaar.nl;
        return 301 https://landgoedeigenaar.nl$request_uri;
}

# =============================================================================
# TOEGEVOEGD: landgoedeigenaar.nl
# HTTPS – proxy naar Next.js op poort 3000 (/var/www/rentmeester)
# =============================================================================
server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name www.landgoedeigenaar.nl landgoedeigenaar.nl;

        ssl_certificate /etc/letsencrypt/live/landgoedeigenaar.nl/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/landgoedeigenaar.nl/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
                proxy_pass http://127.0.0.1:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
        }
}
