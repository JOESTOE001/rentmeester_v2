##
# Nginx default + landgoedeigenaar.nl (proxy naar Next.js)
# Kopieer naar server: sudo nano /etc/nginx/sites-available/default
##

# Default server (port 80)
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;
    server_name _;
}

# landgoedeigenaar.nl – HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.landgoedeigenaar.nl landgoedeigenaar.nl;
    return 301 https://landgoedeigenaar.nl$request_uri;
}

# landgoedeigenaar.nl – HTTPS, proxy naar Next.js (poort 3000)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.landgoedeigenaar.nl landgoedeigenaar.nl;

    ssl_certificate /etc/letsencrypt/live/landgoedeigenaar.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/landgoedeigenaar.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
